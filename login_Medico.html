<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Clínica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="login_Medico.css">
</head>
<body>

<div class="container-fluid vh-100">
    <div class="row h-100">
        
        <div class="col-md-7 col-lg-8 d-none d-md-block p-0 bg-image-container">
            <img src="Imagenes/FondoSesion.jpg" alt="Fondo Clínica" class="bg-image" style="width: 100%; height: 100%; object-fit: cover;">
        </div>

        <div class="col-12 col-md-5 col-lg-4 d-flex align-items-center justify-content-center bg-light">
            <div class="login-box w-100 px-4 px-md-5">
                
                <div class="text-center mb-4">
                    <img src="Imagenes/Logo.png" alt="Logo Clínica" class="img-fluid mb-3" style="max-width: 150px;">
                    <h2 class="fw-bold" style="color: #1e3a8a;">Bienvenido</h2>
                </div>

                <div class="auth-tabs-wrap mb-4">
                    <button class="auth-tab-btn is-active" id="tabLogin" type="button" onclick="switchTab('login')">Ingresar</button>
                    <button class="auth-tab-btn" id="tabRegister" type="button" onclick="switchTab('register')">Registrarse</button>
                </div>

                <form id="loginForm" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Usuario</label>
                        <input type="text" class="form-control p-2" id="username" placeholder="Ingresa tu usuario" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Contraseña</label>
                        <div class="input-group">
                            <input type="password" class="form-control p-2" id="password" placeholder="Tu contraseña" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">👁</button>
                        </div>
                    </div>

                    <button type="submit" class="btn text-white w-100 rounded-pill py-2 fw-bold custom-btn" style="background-color: #2563eb;">
                        Ingresar
                    </button>
                </form>

                <form id="registerForm" class="needs-validation d-none" novalidate>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre Completo</label>
                        <input type="text" class="form-control p-2" placeholder="Juan Pérez" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Correo Electrónico</label>
                        <input type="email" class="form-control p-2" placeholder="juan@correo.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Crear Contraseña</label>
                        <input type="password" class="form-control p-2" placeholder="Mínimo 8 caracteres" required>
                    </div>
                    <button type="submit" class="btn text-white w-100 rounded-pill py-2 fw-bold" style="background-color: #00b8a9;">
                        Registrarme
                    </button>
                </form>
                </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="login_Medico.js"></script>
</body>
</html>
