<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Clínica</title>
    <link rel="stylesheet" href="InicioSesion_Medico.css">
</head>
<body>

<div class="container">

    <div class="left">
        <img src="Imagenes/sesiones-clinicas.jpg" alt="Cirugía" class="bg-image">
    </div>

    <div class="right">

        <div class="login-box">

            <img src="Imagenes/images.png" class="logo" alt="Logo">

            <h2>Iniciar sesión</h2>

            <form id="loginForm">

                <label>Usuario</label>
                <div class="input-group">
   
                    <input type="text" placeholder="Usuario" id="Usuario">
                </div>

                <label>Contraseña</label>
                <div class="input-group">
                    <input type="password" placeholder="Contraseña" id="password">
                    <span class="eye">👁</span>
                </div>

                <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>

                <div class="remember">
                    <input type="checkbox">
                    <label>Recordar Usuario</label>
                </div>

                <button type="submit">Ingresar</button>

                <p class="register">
                    ¿No tienes cuenta? <a href="#">Crear cuenta</a>
                </p>

            </form>

        </div>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
